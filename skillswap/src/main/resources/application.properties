spring.application.name=skillswap

server.port=8080 

spring.datasource.url=jdbc:postgresql://localhost:5432/skillswap_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# Para empezar rápido: crea/actualiza tablas automáticamente 
spring.jpa.hibernate.ddl-auto=update 

# Buenas prácticas 
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true 
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logs SQL (opcional) 
spring.jpa.show-sql=true

# JWT Config
jwt.secret=clave-super-secreta-de-skillswap-32-caracteres-minimo
jwt.expiration-ms=86400000

# Admin seed
app.admin.email=${ADMIN_EMAIL:admin@skillswap.com}
app.admin.password=${ADMIN_PASSWORD:Admin1234!}
app.admin.first-name=Admin
app.admin.last-name=System 